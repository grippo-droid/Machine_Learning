<!DOCTYPE html>
<html>
<head>
    <title>Student Score Prediction</title>
</head>

<body>

    <h1>Student Math Score Prediction</h1>

    <form action="{{ url_for('predict_datapoint') }}" method="post">

        <label>Gender</label>
        <select name="gender" required>
            <option value="0">Male</option>
            <option value="1">Female</option>
        </select>

        <br><br>

        <label>Race/Ethnicity</label>
        <select name="race_ethnicity" required>
            <option value="0">Group A</option>
            <option value="1">Group B</option>
            <option value="2">Group C</option>
            <option value="3">Group D</option>
            <option value="4">Group E</option>
        </select>

        <br><br>

        <label>Parental Level of Education</label>
        <select name="parental_level_of_education" required>
            <option value="0">Some High School</option>
            <option value="1">High School</option>
            <option value="2">Some College</option>
            <option value="3">Associate Degree</option>
            <option value="4">Bachelor's Degree</option>
            <option value="5">Master's Degree</option>
        </select>

        <br><br>

        <label>Lunch</label>
        <select name="lunch" required>
            <option value="0">Standard</option>
            <option value="1">Free/Reduced</option>
        </select>

        <br><br>

        <label>Test Preparation Course</label>
        <select name="test_preparation_course" required>
            <option value="0">None</option>
            <option value="1">Completed</option>
        </select>

        <br><br>

        <label>Reading Score</label>
        <input type="number" name="reading_score" required>

        <br><br>

        <label>Writing Score</label>
        <input type="number" name="writing_score" required>

        <br><br>

        <button type="submit">Predict Math Score</button>

    </form>

    <h2>
        Predicted Math Score: {{ result }}
    </h2>

</body>
</html>
